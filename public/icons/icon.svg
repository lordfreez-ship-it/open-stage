<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1E1608"/>
      <stop offset="100%" stop-color="#0A0704"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C36A"/>
      <stop offset="50%" stop-color="#C9922A"/>
      <stop offset="100%" stop-color="#A67518"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D484"/>
      <stop offset="100%" stop-color="#C9922A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle ring glow -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="rgba(201,146,42,0.08)" stroke-width="60" filter="url(#softGlow)"/>

  <!-- Microphone body -->
  <g filter="url(#glow)">
    <!-- Mic head (mesh grid) -->
    <ellipse cx="256" cy="168" rx="52" ry="68" fill="none" stroke="url(#gold)" stroke-width="4"/>
    <ellipse cx="256" cy="168" rx="52" ry="68" fill="rgba(201,146,42,0.06)"/>

    <!-- Mesh lines horizontal -->
    <line x1="210" y1="140" x2="302" y2="140" stroke="rgba(201,146,42,0.3)" stroke-width="1.5"/>
    <line x1="206" y1="158" x2="306" y2="158" stroke="rgba(201,146,42,0.3)" stroke-width="1.5"/>
    <line x1="206" y1="176" x2="306" y2="176" stroke="rgba(201,146,42,0.3)" stroke-width="1.5"/>
    <line x1="210" y1="194" x2="302" y2="194" stroke="rgba(201,146,42,0.3)" stroke-width="1.5"/>

    <!-- Mesh lines vertical -->
    <line x1="236" y1="102" x2="236" y2="234" stroke="rgba(201,146,42,0.2)" stroke-width="1.5"/>
    <line x1="256" y1="100" x2="256" y2="236" stroke="rgba(201,146,42,0.2)" stroke-width="1.5"/>
    <line x1="276" y1="102" x2="276" y2="234" stroke="rgba(201,146,42,0.2)" stroke-width="1.5"/>

    <!-- Mic body/handle -->
    <rect x="248" y="236" width="16" height="70" rx="4" fill="url(#gold)"/>

    <!-- Mic ring at bottom of head -->
    <rect x="238" y="230" width="36" height="12" rx="6" fill="url(#goldLight)"/>

    <!-- Mic base -->
    <ellipse cx="256" cy="316" rx="32" ry="8" fill="url(#gold)"/>
  </g>

  <!-- Stars/sparkles -->
  <g fill="#C9922A" opacity="0.7">
    <circle cx="160" cy="130" r="3"/>
    <circle cx="350" cy="150" r="2.5"/>
    <circle cx="170" cy="260" r="2"/>
    <circle cx="340" cy="230" r="2.5"/>
    <circle cx="330" cy="120" r="1.8"/>
    <circle cx="185" cy="190" r="1.5"/>
  </g>

  <!-- "OPEN STAGE" text -->
  <text x="256" y="378" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="42" letter-spacing="6" fill="url(#gold)" filter="url(#glow)">OPEN STAGE</text>

  <!-- "with Demir" text -->
  <text x="256" y="418" text-anchor="middle" font-family="'Brush Script MT', 'Segoe Script', cursive" font-size="32" fill="#C1440E" filter="url(#glow)">with Demir</text>

  <!-- Bottom accent line -->
  <line x1="156" y1="440" x2="356" y2="440" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>

  <!-- Tiny DC's branding -->
  <text x="256" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="3" fill="rgba(201,146,42,0.35)" font-weight="600">DC'S LIVE MUSIC</text>
</svg>
